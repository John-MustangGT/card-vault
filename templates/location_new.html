{% extends "base.html" %}
{% block title %}New Location — card-vault{% endblock %}
{% block content %}
<div class="page-header">
  <h1>new location</h1>
  <a href="/locations" class="btn btn-secondary">← back</a>
</div>

<div class="card" style="max-width:480px;">
  <form method="POST" action="/locations">
    <div class="form-group">
      <label>Name</label>
      <input type="text" name="name" required placeholder="e.g. Binder A, Red Box…">
    </div>
    <div class="form-group">
      <label>Type</label>
      <select name="type" required>
        <option value="binder">Binder</option>
        <option value="box">Box</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" rows="3" placeholder="Optional description…"></textarea>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;">
      create location
    </button>
  </form>
</div>
{% endblock %}
