<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}card-vault{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f11;
      --surface: #161a1e;
      --surface2: #1e2329;
      --border: #2a3040;
      --text: #c8d0da;
      --text-dim: #6b7a8d;
      --accent: #4a9eff;
      --accent-dim: #2d6bbf;
      --success: #3fb950;
      --warning: #d29922;
      --danger: #f85149;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 14px; line-height: 1.6; min-height: 100vh; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1,h2,h3,h4 { font-family: var(--font-mono); font-weight: 600; color: #e2e8f0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 0; }
    nav .nav-inner { display: flex; align-items: center; gap: 32px; max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    nav .brand { font-family: var(--font-mono); font-size: 16px; font-weight: 600; color: var(--accent); letter-spacing: 0.05em; }
    nav a { color: var(--text-dim); font-size: 13px; font-family: var(--font-mono); }
    nav a:hover, nav a.active { color: var(--text); text-decoration: none; }
    main { padding: 32px 0; }
    .page-header { margin-bottom: 24px; display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .page-header h1 { font-size: 20px; letter-spacing: 0.02em; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 4px; font-family: var(--font-mono); font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #0d0f11; border-color: var(--accent); }
    .btn-primary:hover { background: #6ab0ff; border-color: #6ab0ff; text-decoration: none; }
    .btn-secondary { background: transparent; color: var(--text); border-color: var(--border); }
    .btn-secondary:hover { border-color: var(--text-dim); text-decoration: none; }
    .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; text-decoration: none; }
    table { width: 100%; border-collapse: collapse; }
    th { font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
    tr:hover td { background: var(--surface2); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 20px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    input, select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--font-sans); font-size: 13px; padding: 8px 10px; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-family: var(--font-mono); font-size: 11px; font-weight: 500; }
    .badge-nm { background: #1a3a1f; color: var(--success); }
    .badge-lp { background: #1e2d0a; color: #8ac926; }
    .badge-mp { background: #2a2a0a; color: var(--warning); }
    .badge-hp { background: #2d1a0a; color: #e07b39; }
    .badge-dmg { background: #2d0a0a; color: var(--danger); }
    .badge-pld { background: #2d0a0a; color: var(--danger); }
    .badge-foil { background: #1a1a3a; color: #9d7af7; }
    .badge-in-stock { background: #1a3a1f; color: var(--success); }
    .badge-listed { background: #1a2a3a; color: var(--accent); }
    .badge-graded { background: #2a1a3a; color: #c77dff; }
    .badge-sold { background: #2a2a2a; color: var(--text-dim); }
    .badge-out-for-grading { background: #2a1f0a; color: var(--warning); }
    .alert { padding: 12px 16px; border-radius: 4px; font-size: 13px; margin-bottom: 16px; }
    .alert-success { background: #1a3a1f; border: 1px solid #3fb950; color: #3fb950; }
    .alert-error { background: #2d0a0a; border: 1px solid var(--danger); color: var(--danger); }
    .alert-info { background: #0a1a2d; border: 1px solid var(--accent); color: var(--accent); }
    .mono { font-family: var(--font-mono); }
    .text-dim { color: var(--text-dim); }
    .text-accent { color: var(--accent); }
    .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; }
    .filter-bar .form-group { margin-bottom: 0; min-width: 140px; flex: 1; }
    .pagination { display: flex; align-items: center; gap: 8px; margin-top: 20px; justify-content: center; font-family: var(--font-mono); font-size: 12px; }
    .pagination a, .pagination span { padding: 5px 10px; border-radius: 3px; border: 1px solid var(--border); color: var(--text-dim); }
    .pagination a:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }
    .pagination .current { background: var(--accent); border-color: var(--accent); color: #0d0f11; }
    .stats-bar { display: flex; gap: 24px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-value { font-family: var(--font-mono); font-size: 16px; font-weight: 600; color: var(--accent); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav>
  <div class="nav-inner">
    <span class="brand">card-vault</span>
    <a href="/inventory">inventory</a>
    <a href="/individuals">individuals</a>
    <a href="/locations">locations</a>
    <a href="/import">import</a>
  </div>
</nav>
<main>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</main>
</body>
</html>
